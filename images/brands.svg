<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Lumileds Logo -->
  <symbol id="lumileds" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0055A4">Lumileds</text>
  </symbol>
  
  <!-- Cree LED Logo -->
  <symbol id="cree" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00A651">Cree LED</text>
  </symbol>
  
  <!-- Luminus Logo -->
  <symbol id="luminus" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0072CE">Luminus</text>
  </symbol>
  
  <!-- Cosel Logo -->
  <symbol id="cosel" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E60012">Cosel</text>
  </symbol>
  
  <!-- Traco Power Logo -->
  <symbol id="traco" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#003366">TRACO POWER</text>
  </symbol>
  
  <!-- Huawei Logo -->
  <symbol id="huawei" viewBox="0 0 200 50">
    <path d="M100 5 L105 20 L95 20 Z" fill="#CF0A2C"/>
    <path d="M85 15 L90 30 L80 30 Z" fill="#CF0A2C"/>
    <path d="M115 15 L120 30 L110 30 Z" fill="#CF0A2C"/>
    <path d="M70 25 L75 40 L65 40 Z" fill="#CF0A2C"/>
    <path d="M130 25 L135 40 L125 40 Z" fill="#CF0A2C"/>
    <path d="M55 35 L60 50 L50 50 Z" fill="#CF0A2C"/>
    <path d="M145 35 L150 50 L140 50 Z" fill="#CF0A2C"/>
    <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#CF0A2C" font-weight="bold">HUAWEI</text>
  </symbol>
  
  <!-- Great Wall Logo -->
  <symbol id="greatwall" viewBox="0 0 200 40">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41E3A">Great Wall</text>
  </symbol>
  
  <!-- Baichuan Logo -->
  <symbol id="baichuan" viewBox="0 0 200 40">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">百川创新</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#666">Baichuan Innovation</text>
  </symbol>
</svg>
