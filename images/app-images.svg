<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  
  <!-- 照明应用图 -->
  <symbol id="img-lighting" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <rect x="50" y="40" width="300" height="150" rx="8" fill="#e2e8f0"/>
    <rect x="60" y="50" width="280" height="130" rx="4" fill="#fff"/>
    <!-- 天花板灯 -->
    <rect x="100" y="60" width="80" height="8" rx="4" fill="#3182ce" opacity="0.8"/>
    <rect x="220" y="60" width="80" height="8" rx="4" fill="#3182ce" opacity="0.8"/>
    <!-- 光线 -->
    <polygon points="140,68 120,120 160,120" fill="#63b3ed" opacity="0.3"/>
    <polygon points="260,68 240,120 280,120" fill="#63b3ed" opacity="0.3"/>
    <!-- 办公桌 -->
    <rect x="80" y="130" width="100" height="40" rx="4" fill="#cbd5e0"/>
    <rect x="220" y="130" width="100" height="40" rx="4" fill="#cbd5e0"/>
    <!-- 人 -->
    <circle cx="130" cy="115" r="12" fill="#a0aec0"/>
    <rect x="118" y="128" width="24" height="30" rx="4" fill="#718096"/>
    <circle cx="270" cy="115" r="12" fill="#a0aec0"/>
    <rect x="258" y="128" width="24" height="30" rx="4" fill="#718096"/>
    <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">商业照明解决方案</text>
  </symbol>

  <!-- 医疗应用图 -->
  <symbol id="img-medical" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <rect x="40" y="30" width="320" height="170" rx="8" fill="#e6fffa"/>
    <!-- 手术灯 -->
    <circle cx="200" cy="60" r="35" fill="#fff" stroke="#38b2ac" stroke-width="3"/>
    <circle cx="200" cy="60" r="25" fill="#e6fffa"/>
    <!-- 光线 -->
    <polygon points="200,95 150,160 250,160" fill="#81e6d9" opacity="0.4"/>
    <!-- 手术台 -->
    <rect x="120" y="150" width="160" height="30" rx="8" fill="#cbd5e0"/>
    <rect x="140" y="140" width="120" height="15" rx="4" fill="#a0aec0"/>
    <!-- 医疗设备 -->
    <rect x="60" y="100" width="40" height="60" rx="4" fill="#fff" stroke="#38b2ac" stroke-width="2"/>
    <rect x="300" y="100" width="40" height="60" rx="4" fill="#fff" stroke="#38b2ac" stroke-width="2"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#234e52">医疗设备照明与电源</text>
  </symbol>

  <!-- 汽车应用图 -->
  <symbol id="img-automotive" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <rect x="30" y="60" width="340" height="120" rx="60" fill="#2d3748"/>
    <rect x="40" y="70" width="320" height="100" rx="50" fill="#1a202c"/>
    <!-- 车灯 -->
    <ellipse cx="100" cy="120" rx="35" ry="20" fill="#e2e8f0"/>
    <ellipse cx="100" cy="120" rx="25" ry="14" fill="#fff" opacity="0.9"/>
    <ellipse cx="100" cy="120" rx="15" ry="8" fill="#63b3ed" opacity="0.8"/>
    <!-- 光线 -->
    <polygon points="70,120 20,100 20,140" fill="#63b3ed" opacity="0.3"/>
    <!-- 格栅 -->
    <rect x="160" y="100" width="80" height="40" rx="4" fill="#4a5568"/>
    <line x1="170" y1="100" x2="170" y2="140" stroke="#2d3748" stroke-width="2"/>
    <line x1="190" y1="100" x2="190" y2="140" stroke="#2d3748" stroke-width="2"/>
    <line x1="210" y1="100" x2="210" y2="140" stroke="#2d3748" stroke-width="2"/>
    <line x1="230" y1="100" x2="230" y2="140" stroke="#2d3748" stroke-width="2"/>
    <!-- 右侧车灯 -->
    <ellipse cx="300" cy="120" rx="35" ry="20" fill="#e2e8f0"/>
    <ellipse cx="300" cy="120" rx="25" ry="14" fill="#fff" opacity="0.9"/>
    <ellipse cx="300" cy="120" rx="15" ry="8" fill="#63b3ed" opacity="0.8"/>
    <polygon points="330,120 380,100 380,140" fill="#63b3ed" opacity="0.3"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">汽车LED照明系统</text>
  </symbol>

  <!-- 军工应用图 -->
  <symbol id="img-military" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <rect x="50" y="50" width="300" height="140" rx="8" fill="#4a5568"/>
    <rect x="60" y="60" width="280" height="120" rx="4" fill="#2d3748"/>
    <!-- 控制面板 -->
    <rect x="80" y="80" width="100" height="80" rx="4" fill="#1a202c"/>
    <!-- 指示灯 -->
    <circle cx="100" cy="100" r="8" fill="#48bb78"/>
    <circle cx="130" cy="100" r="8" fill="#ed8936"/>
    <circle cx="160" cy="100" r="8" fill="#e53e3e"/>
    <!-- 显示屏 -->
    <rect x="90" y="120" width="80" height="30" rx="2" fill="#63b3ed" opacity="0.3"/>
    <!-- 电源模块 -->
    <rect x="200" y="80" width="120" height="80" rx="4" fill="#1a202c"/>
    <rect x="210" y="90" width="100" height="20" rx="2" fill="#4a5568"/>
    <rect x="210" y="120" width="100" height="20" rx="2" fill="#4a5568"/>
    <!-- 散热片 -->
    <line x1="330" y1="80" x2="330" y2="160" stroke="#718096" stroke-width="3"/>
    <line x1="340" y1="80" x2="340" y2="160" stroke="#718096" stroke-width="3"/>
    <line x1="350" y1="80" x2="350" y2="160" stroke="#718096" stroke-width="3"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">高可靠军工电源系统</text>
  </symbol>

  <!-- 通讯应用图 -->
  <symbol id="img-telecom" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <!-- 基站塔 -->
    <rect x="190" y="40" width="20" height="140" fill="#718096"/>
    <line x1="180" y1="60" x2="220" y2="60" stroke="#a0aec0" stroke-width="3"/>
    <line x1="175" y1="90" x2="225" y2="90" stroke="#a0aec0" stroke-width="3"/>
    <line x1="180" y1="120" x2="220" y2="120" stroke="#a0aec0" stroke-width="3"/>
    <!-- 天线 -->
    <rect x="170" y="30" width="8" height="40" fill="#4a5568"/>
    <rect x="222" y="30" width="8" height="40" fill="#4a5568"/>
    <rect x="150" y="25" width="6" height="50" fill="#4a5568"/>
    <rect x="244" y="25" width="6" height="50" fill="#4a5568"/>
    <!-- 信号波 -->
    <path d="M200,20 Q230,5 260,20" fill="none" stroke="#3182ce" stroke-width="2" opacity="0.6"/>
    <path d="M200,15 Q235,-5 270,15" fill="none" stroke="#3182ce" stroke-width="2" opacity="0.4"/>
    <!-- 设备箱 -->
    <rect x="80" y="120" width="80" height="60" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="90" y="130" width="60" height="8" rx="2" fill="#63b3ed" opacity="0.5"/>
    <rect x="90" y="145" width="60" height="8" rx="2" fill="#63b3ed" opacity="0.5"/>
    <rect x="90" y="160" width="60" height="8" rx="2" fill="#63b3ed" opacity="0.5"/>
    <!-- 连接线 -->
    <line x1="160" y1="150" x2="190" y2="150" stroke="#a0aec0" stroke-width="2"/>
    <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">通信基站电源系统</text>
  </symbol>

  <!-- 铁路应用图 -->
  <symbol id="img-railway" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <!-- 铁轨 -->
    <rect x="0" y="160" width="400" height="8" fill="#4a5568"/>
    <rect x="0" y="180" width="400" height="8" fill="#4a5568"/>
    <!-- 枕木 -->
    <rect x="20" y="168" width="40" height="12" fill="#718096"/>
    <rect x="100" y="168" width="40" height="12" fill="#718096"/>
    <rect x="180" y="168" width="40" height="12" fill="#718096"/>
    <rect x="260" y="168" width="40" height="12" fill="#718096"/>
    <rect x="340" y="168" width="40" height="12" fill="#718096"/>
    <!-- 列车 -->
    <rect x="50" y="80" width="200" height="70" rx="8" fill="#e53e3e"/>
    <rect x="60" y="90" width="60" height="25" rx="4" fill="#2d3748"/>
    <rect x="140" y="90" width="60" height="25" rx="4" fill="#2d3748"/>
    <!-- 车窗 -->
    <rect x="65" y="95" width="50" height="15" rx="2" fill="#63b3ed" opacity="0.5"/>
    <rect x="145" y="95" width="50" height="15" rx="2" fill="#63b3ed" opacity="0.5"/>
    <!-- 受电弓 -->
    <line x1="150" y1="80" x2="150" y2="50" stroke="#4a5568" stroke-width="3"/>
    <line x1="130" y1="50" x2="170" y2="50" stroke="#4a5568" stroke-width="3"/>
    <!-- 电线 -->
    <line x1="0" y1="45" x2="400" y2="45" stroke="#718096" stroke-width="2"/>
    <!-- 电源设备 -->
    <rect x="280" y="100" width="80" height="50" rx="4" fill="#fff" stroke="#e53e3e" stroke-width="2"/>
    <text x="320" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53e3e">车载电源</text>
    <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">铁路车载电源系统</text>
  </symbol>

  <!-- 新能源应用图 -->
  <symbol id="img-newenergy" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <!-- 太阳 -->
    <circle cx="320" cy="50" r="30" fill="#ed8936" opacity="0.8"/>
    <line x1="320" y1="10" x2="320" y2="20" stroke="#ed8936" stroke-width="3"/>
    <line x1="320" y1="80" x2="320" y2="90" stroke="#ed8936" stroke-width="3"/>
    <line x1="280" y1="50" x2="290" y2="50" stroke="#ed8936" stroke-width="3"/>
    <line x1="350" y1="50" x2="360" y2="50" stroke="#ed8936" stroke-width="3"/>
    <!-- 太阳能板 -->
    <rect x="60" y="80" width="120" height="80" rx="4" fill="#3182ce" transform="skewY(-5)"/>
    <line x1="80" y1="75" x2="80" y2="155" stroke="#2c5282" stroke-width="1" transform="skewY(-5)"/>
    <line x1="100" y1="73" x2="100" y2="153" stroke="#2c5282" stroke-width="1" transform="skewY(-5)"/>
    <line x1="120" y1="71" x2="120" y2="151" stroke="#2c5282" stroke-width="1" transform="skewY(-5)"/>
    <line x1="140" y1="69" x2="140" y2="149" stroke="#2c5282" stroke-width="1" transform="skewY(-5)"/>
    <!-- 储能箱 -->
    <rect x="220" y="120" width="100" height="60" rx="4" fill="#fff" stroke="#48bb78" stroke-width="2"/>
    <rect x="230" y="130" width="80" height="15" rx="2" fill="#48bb78" opacity="0.3"/>
    <rect x="230" y="150" width="80" height="15" rx="2" fill="#48bb78" opacity="0.3"/>
    <!-- 电池图标 -->
    <rect x="245" y="135" width="20" height="10" rx="2" fill="#48bb78"/>
    <rect x="270" y="135" width="20" height="10" rx="2" fill="#48bb78"/>
    <rect x="245" y="155" width="20" height="10" rx="2" fill="#48bb78"/>
    <rect x="270" y="155" width="20" height="10" rx="2" fill="#48bb78"/>
    <!-- 连接线 -->
    <line x1="180" y1="140" x2="220" y2="140" stroke="#a0aec0" stroke-width="2"/>
    <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">光伏储能电源系统</text>
  </symbol>

  <!-- 工业应用图 -->
  <symbol id="img-industrial" viewBox="0 0 400 225">
    <rect width="400" height="225" fill="#f0f4f8"/>
    <!-- 工厂建筑 -->
    <rect x="50" y="60" width="300" height="120" rx="8" fill="#e2e8f0"/>
    <rect x="60" y="70" width="280" height="100" rx="4" fill="#fff"/>
    <!-- 机械臂 -->
    <rect x="100" y="100" width="20" height="60" rx="4" fill="#718096"/>
    <rect x="90" y="90" width="40" height="20" rx="4" fill="#4a5568"/>
    <circle cx="110" cy="100" r="8" fill="#3182ce"/>
    <!-- 传送带 -->
    <rect x="150" y="140" width="150" height="20" rx="4" fill="#a0aec0"/>
    <rect x="160" y="135" width="30" height="10" rx="2" fill="#ed8936"/>
    <rect x="210" y="135" width="30" height="10" rx="2" fill="#ed8936"/>
    <!-- 控制柜 -->
    <rect x="320" y="80" width="50" height="80" rx="4" fill="#fff" stroke="#3182ce" stroke-width="2"/>
    <circle cx="335" cy="100" r="6" fill="#48bb78"/>
    <circle cx="355" cy="100" r="6" fill="#e53e3e"/>
    <rect x="330" y="120" width="30" height="4" rx="2" fill="#a0aec0"/>
    <rect x="330" y="130" width="30" height="4" rx="2" fill="#a0aec0"/>
    <rect x="330" y="140" width="30" height="4" rx="2" fill="#a0aec0"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a5568">工业自动化设备电源</text>
  </symbol>

</svg>
